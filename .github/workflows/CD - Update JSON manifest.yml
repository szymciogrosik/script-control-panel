name: Update JSON Manifest on Release Events

on:
  release:
    types: [published, deleted, edited, prereleased, released]
  workflow_dispatch:

jobs:
  update_gh_pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: release/gh-pages

      - name: Generate latest_release.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs
          
          # Fetch all releases
          LATEST_STABLE=$(gh release list --exclude-drafts --exclude-pre-releases -L 1 --json tagName,publishedAt)
          LATEST_PRE=$(gh release list --exclude-drafts -L 10 --json tagName,publishedAt,isPrerelease | jq '[.[] | select(.isPrerelease == true)][0]')
          
          cat << 'EOF' > generate_json.py
          import json, sys

          def load_json(idx):
              try:
                  return json.loads(sys.argv[idx]) if sys.argv[idx] and sys.argv[idx] != 'null' else None
              except json.JSONDecodeError:
                  return None

          stable_data = load_json(1)
          pre_data = load_json(2)

          def extract_info(release):
              if not release: return None
              if isinstance(release, list):
                  if not release: return None
                  release = release[0]
          
              version = release.get("tagName")
              if not version: return None
              published_at = release.get("publishedAt")
          
              download_url = f"https://github.com/szymciogrosik/script-control-panel/releases/download/{version}/ScriptControlPanel-Win.zip"
          
              return {
                  "version": version,
                  "downloadUrl": download_url,
                  "releaseDate": published_at
              }

          result = {
              "release": extract_info(stable_data),
              "preRelease": extract_info(pre_data)
          }

          with open("docs/latest_release.json", "w") as f:
              json.dump(result, f, indent=2)
          EOF
          
          python3 generate_json.py "$LATEST_STABLE" "$LATEST_PRE"

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add docs/latest_release.json
          
          # Check for changes in the staging area to avoid commit errors
          if git diff --staged --quiet; then
            echo "No changes in latest_release.json detected. Skipping commit."
            exit 0
          fi
          
          # Append [skip ci] to avoid triggering other push workflows
          git commit -m "ci: update latest_release.json on release event [skip ci]"
          git push origin HEAD:refs/heads/release/gh-pages